    risk_reason: "Ghost Bubble edge-case (board-edge neighbor count) is a subtle correctness issue. CompanionRenderer must be initialized and connected to GameController event callbacks without creating a DOM element. Verify: companion strip does not overlap board cells."

  - id: 5
    name: "Visual Identity — Loading + Title Screens"
    priority: P1
    player_visible: "Loading screen shows Scooby running animation (emoji fallback) on a themed background with a Snack-themed progress bar. Title screen shows 'Scooby Snack Smash' logo, Scooby peek-from-below animation, and a prominent 'Play' button in the bottom thumb zone."
    features:
      - loading-screen
      - title-screen
    cos_covered: []
    ux_zones:
      thumb_zone:
        - center-bottom
      touch_targets:
        - play-button
      feedback_surfaces:
        - loading-progress-bar
        - title-logo
        - play-button
    acceptance:
      # loading-screen
      - given: "App opens and loading screen displays"
        should: "Background shows themed color (#BCE083 or GDD-specified), progress bar fills with 🍖 emoji icons (or tinted sprite fallback), no 'Game Over' or generic placeholder text visible"
      - given: "All bundles loaded (progress = 100%)"
        should: "Screen auto-transitions to start screen without player action"
      # title-screen
      - given: "Title screen renders"
        should: "'Scooby Snack Smash' text logo visible at top-center; 'Play' button visible in bottom-third thumb zone (Natural zone); settings icon at top-right (Stretching zone)"
      - given: "Player taps 'Play' button"
        should: "Audio unlocked (unlockAudio() called); screen transitions to game screen"
      - given: "Title screen first renders"
        should: "Logo wobble animation plays (GSAP, not CSS transition); Scooby peek-from-below emoji animation plays"
    test_loci:
      - describe: "LoadingScreen: progress and transition"
        file: "tests/scooby-snack-smash/loading-screen.test.ts"
        cases:
          - "progress bar advances as bundles load"
          - "auto-transitions to start when progress = 100%"
          - "no placeholder text visible (no 'Game Over', no 'Loading...' text)"
      - describe: "StartScreen: Play button placement"
        file: "tests/scooby-snack-smash/start-screen.test.ts"
        cases:
          - "Play button is in bottom third of screen (y > 66% of viewport height)"
          - "Play button tap calls unlockAudio() before transition"
          - "Settings icon is in top-right zone"
    files:
      state: []
      integration:
        - src/game/screens/LoadingScreen.tsx
        - src/game/screens/StartScreen.tsx
        - src/game/scooby-snack-smash/screens/startView.ts
      test:
        - tests/scooby-snack-smash/loading-screen.test.ts
        - tests/scooby-snack-smash/start-screen.test.ts
    how:
      - "LoadingScreen.tsx: replace generic spinner with SolidJS component showing themed background (use CSS background-color matching GDD palette), progress bar fills using <For> of 🍖 emoji icons scaled by progress()/total; wire to coordinator.onProgress callback already in scaffold."
      - "StartScreen.tsx + startView.ts: replace DOM placeholder heading with SolidJS layout — logo text at top (font-size 2.5rem, styled), Scooby peek emoji (🐕) at center-bottom with GSAP slide-up animation on mount, 'Play' button at bottom-third (bottom-[20%] or equivalent). unlockAudio() in play-button onClick before goto('game')."
      - "DOM-only screens: SolidJS patterns apply (createSignal, not useState); all animations via GSAP (no CSS transitions); no Pixi in these screens."
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at files.integration (LoadingScreen.tsx progress bar wired; StartScreen.tsx Play button calls unlockAudio)"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "Play button in bottom thumb zone (Natural zone per UX guidelines; bottom-third placement ✓)"
      - "touch targets ≥ 44px per ux_zones (Play button ≥ 44×44px)"
      - "no placeholder or scaffold copy in player-facing text (guardrail #15): no 'Start Screen' heading, no generic loading spinner text"
      - "SolidJS patterns used (no React hooks)"
      - "bun run build + bun run test:run pass within 3 fix cycles"
    risk: MEDIUM
    risk_reason: "startView.ts replaces a DOM placeholder — must preserve scaffold wiring (unlockAudio, loadCore, goto) while replacing visual content. LoadingScreen progress wiring already exists; verify no regression."

  - id: 6
    name: "Level Data + Results Screens"
    priority: P1
    player_visible: "10 hand-crafted levels load correctly (Level 1 is always solvable tutorial board). Win results screen shows Scooby victory dance emoji, star rating (1-3), score pop-in, and 'Next Level' button. Loss screen shows 'Ruh-roh!' Scooby with positive retry copy and 'Try Again' button."
    features:
      - level-gen-handcrafted
      - results-screen-win
      - results-screen-loss
    cos_covered:
      - scoring
    ux_zones:
      thumb_zone:
        - center-bottom
      touch_targets:
        - next-level-button
        - try-again-button
      feedback_surfaces:
        - score-display
        - star-rating
        - companion-animation
    acceptance:
      # level-gen-handcrafted
      - given: "Level 1 loads"
        should: "hand-crafted-levels.json provides a 7×10 grid with tapBudget and objectives; Level 1 grid is always solvable (has at least one valid group of 2+ on initial board)"
      - given: "Levels 1-10 all loaded"
        should: "All 10 levels have valid grids (7 columns × 10 rows), non-zero tapBudget, and at least one valid group on initial board"
      # results-screen-win
      - given: "Results screen renders with outcome='win'"
        should: "Scooby victory emoji 🐕🎉 displays; score value animates counting upward (200ms per digit); star rating shows 1, 2, or 3 stars matching starsEarned; 'Next Level' button visible in Natural thumb zone"
      - given: "'Next Level' button tapped on win screen"
        should: "Navigate to game screen with levelNumber+1"
      - given: "Win results screen renders"
        should: "No 'Game Over' text present anywhere on screen"
      # results-screen-loss
      - given: "Results screen renders with outcome='loss'"
        should: "Scooby 'Ruh-roh!' 🐕😬 emoji displays; positive retry copy visible ('So close! Give it another try!'); 'Try Again' button visible in Natural thumb zone; no 'Game Over' text"
      - given: "'Try Again' button tapped on loss screen"
        should: "Navigate to game screen with same levelNumber and same seed"
    test_loci:
      - describe: "hand-crafted-levels: validity"
        file: "tests/scooby-snack-smash/hand-crafted-levels.test.ts"
        cases:
          - "all 10 levels have 7×10 grid dimensions"
          - "all levels have non-zero tapBudget"
          - "Level 1 has at least one valid group of 2+ on initial board"
          - "pool.length == 10 (content sufficiency: 10 levels >= 10-level chapter requirement)"
      - describe: "ResultsScreen: win and loss branches"
        file: "tests/scooby-snack-smash/results-screen.test.ts"
        cases:
          - "win branch shows victory emoji and star count matching starsEarned"
          - "win branch shows Next Level button"
          - "loss branch shows Ruh-roh copy and Try Again button"
          - "no 'Game Over' text in either branch"
          - "Next Level navigates to levelNumber+1"
          - "Try Again navigates to same level same seed"
    files:
      state: []
      integration:
        - src/game/screens/ResultsScreen.tsx
        - src/game/scooby-snack-smash/data/hand-crafted-levels.json
      test:
        - tests/scooby-snack-smash/hand-crafted-levels.test.ts
        - tests/scooby-snack-smash/results-screen.test.ts
    how:
      - "hand-crafted-levels.json: JSON array of 10 level objects {levelNumber, grid (7×10 array of cellType strings), tapBudget, winThreshold, objectives[]}. Level 1 grid is designed with large obvious clusters for tutorial. All levels hand-authored as JSON — no procedural generation."
      - "ResultsScreen.tsx: add win/loss branch via SolidJS Show component reading props.outcome (passed via goto params). Win branch: emoji header 🐕🎉, GSAP count-up for score (createSignal counting from 0), star row (3 star emojis, stagger reveal via GSAP delayedCall), 'Next Level' button bottom-center. Loss branch: emoji header 🐕😬, positive copy, score tally, 'Try Again' button bottom-center. No 'Game Over' text."
      - "Remove all scaffold placeholder text from ResultsScreen.tsx ('Game Over', 'Play Again', 'Main Menu') — full replacement with GDD-specified content."
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at files.integration (ResultsScreen.tsx uses goto params for outcome; game navigates to 'results' with {outcome, stars, score, levelNumber, seed})"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "CoS sub-walk clean for scoring: star rating visible on win screen with correct 1/2/3 star display"
      - "touch targets ≥ 44px per ux_zones (Next Level and Try Again buttons ≥ 44×44px)"
      - "No 'Game Over' text in ResultsScreen.tsx (collision-resolved:results-screen-text)"
      - "Correct button labels: 'Next Level' on win, 'Try Again' on loss (collision-resolved:results-screen-buttons)"
      - "content sufficiency: hand-crafted-levels.json has 10 entries >= 10-level chapter-1 requirement"
      - "bun run build + bun run test:run pass within 3 fix cycles"
    risk: MEDIUM
    risk_reason: "ResultsScreen.tsx is a full content replacement of the scaffold file — all scaffold placeholder text removed. Must preserve navigation wiring while replacing visuals. Win/loss branch requires goto() to pass outcome params correctly."

  - id: 7
    name: "Chapter System — Progression + Interstitials"
    priority: P2
    player_visible: "Completing Level 10 triggers a 'Mystery Solved!' chapter-complete overlay with haunted location reveal and gang celebration. Starting a new chapter shows a full-screen haunted location illustration with a Scooby caption and 'Let's Go!' button."
    features:
      - chapter-progression
      - chapter-interstitial
      - chapter-complete-screen
    cos_covered: []
    ux_zones:
      thumb_zone:
        - center-bottom
      touch_targets:
        - lets-go-button
        - continue-button
      feedback_surfaces:
        - chapter-illustration
        - mystery-solved-banner
        - companion-animation
        - caption-text
    acceptance:
      # chapter-progression
      - given: "Player completes level 10 (last level of chapter 1)"
        should: "Chapter-complete overlay renders before navigating to next chapter interstitial; chapter 2 begins at level 11"
      - given: "Player completes any non-final level in a chapter"
        should: "Results screen shows win screen normally; no chapter-complete overlay; level increments by 1"
      # chapter-interstitial
      - given: "New chapter starts (first level of chapter)"
        should: "Chapter interstitial screen shows: full-screen haunted location emoji background 🏚️, 2-line Scooby caption text, 'Let's Go!' button in Natural (bottom-third) thumb zone"
      - given: "Player taps 'Let's Go!' button"
        should: "Navigate to game screen for chapter's first level"
      # chapter-complete-screen
      - given: "Chapter complete overlay renders"
        should: "'Mystery Solved! 🔍' banner visible; Scooby celebration emoji 🐕🎉 animates; 'Continue' button visible in Natural zone"
      - given: "Player taps 'Continue' on chapter-complete overlay"
        should: "Navigate to next chapter's interstitial screen"
    test_loci:
      - describe: "chapter-progression: level and chapter logic"
        file: "tests/scooby-snack-smash/chapter-progression.test.ts"
        cases:
          - "level 10 triggers chapter complete (10 levels per chapter)"
          - "level 9 does not trigger chapter complete"
          - "chapter 2 starts at level 11"
          - "chapter index = Math.floor((levelNumber - 1) / 10)"
      - describe: "chapter-interstitial: rendering and navigation"
        file: "tests/scooby-snack-smash/chapter-interstitial.test.ts"
        cases:
          - "Let's Go button is in bottom-third of screen"
          - "caption text shows 2 lines"
          - "tapping Let's Go navigates to first level of chapter"
    files:
      state:
        - src/game/scooby-snack-smash/state/BoardPlugin.ts
        - src/game/scooby-snack-smash/data/chapter-config.ts
      integration:
        - src/game/screens/ResultsScreen.tsx
        - src/game/scooby-snack-smash/screens/ChapterInterstitial.ts
        - src/game/scooby-snack-smash/screens/ChapterCompleteOverlay.ts
      test:
        - tests/scooby-snack-smash/chapter-progression.test.ts
        - tests/scooby-snack-smash/chapter-interstitial.test.ts
    how:
      - "chapter-config.ts: array of {chapterId, name, locationEmoji, caption1, caption2, startLevel, endLevel} for chapters 1+. Chapter 1: 'The Old Haunted Mansion 🏚️', levels 1–10. Chapter 2: 'The Abandoned Theme Park 🎢', levels 11–20. Wire chapter detection: chapterIndex = Math.floor((levelNumber - 1) / 10)."
      - "ChapterInterstitial.ts: SolidJS-based DOM screen branch within 'results' screen route (Results screen checks goto params for {outcome: 'chapter-start'}). Renders emoji background, caption, 'Let's Go!' button at bottom-third. Navigation from ResultsScreen win-branch when isLastLevelOfChapter."
      - "ChapterCompleteOverlay.ts: overlay rendered OVER the results screen (absolute positioned SolidJS component in ResultsScreen.tsx) when outcome='chapter-complete'. Emoji banner + celebration animation via GSAP delayedCall. 'Continue' navigates to {outcome: 'chapter-start', chapterId: next}."
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at files.integration (ResultsScreen.tsx routes to chapter-complete overlay and chapter-interstitial correctly; chapter-progression logic called from GameController)"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "'Let's Go!' and 'Continue' buttons in Natural thumb zone (bottom-third ≥ y > 66%)"
      - "touch targets ≥ 44px per ux_zones"
      - "no new top-level screen IDs introduced — chapter screens are branches/overlays within 'results' screen ID (collision-resolved: valid screen IDs)"
      - "bun run build + bun run test:run pass within 3 fix cycles"
    risk: MEDIUM
    risk_reason: "Chapter screen routing must stay within existing 'results' screen ID — cannot add new top-level screen IDs. ChapterInterstitial and ChapterCompleteOverlay must be branches/overlays, not new routes. Verify: goto('results', {outcome:'chapter-start'}) navigates correctly."

