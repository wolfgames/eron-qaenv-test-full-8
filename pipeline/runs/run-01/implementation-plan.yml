      - "CompanionRenderer: Pixi Container positioned at bottom of viewport (eventMode='none' — no interactive children); displays emoji Text for reactions driven by event callbacks from GameController (onValidTap, onInvalidTap, onWin, onLoss, onMilestone). GSAP for all animations."
      - "BlockRenderer extends to handle special cell types: MegaSnack renders as 🌟 Text with GSAP pulsing glow (alpha cycle); GhostBubble renders as 👻 Text; acquired from pool by stable entity ID."
    definition_of_done:
