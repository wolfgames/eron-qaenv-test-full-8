      onboarding: "Difficulty scaling ensures gradual introduction of Ghost Bubbles and specials"
    notes: |
      4-step algorithm: difficulty param lookup → board placement → solvability simulation → special injection.
      Seed formula: levelNumber × 31337 + playerUserId % 9999.
      Rejection conditions: NO_VALID_GROUPS, UNSOLVABLE_SIMULATION, GHOST_ISOLATION, COLOR_STARVATION.
      Max 10 retries; fallback chain to hand-crafted pool; absolute fallback = Level 1.
      Difficulty bands: 11-30 (4 types, 0-2 ghosts), 31-60 (4-5 types, Mega Snacks), 61+ (5 types, Mystery Bags).
      skill-curve CoS gated at meta pass; deferred to meta pass; status: deferred-to-pass-meta.
      Solvability forward simulation uses seeded greedy algorithm — pure function, testable.
      HIGH complexity but MEDIUM risk: isolated pure logic, not touching renderer directly.

