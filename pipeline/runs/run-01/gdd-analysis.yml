    dependencies: [play-canvas, treat-bubbles]
    ux:
      discovery: "Gravity is immediately visible after first pop — bubbles fall"
      feedback: "200ms fall + 80ms settle per row; bounce-settle animation on landing"
      onboarding: "Physics teaches itself — first pop shows cascade naturally"
    notes: |
      Vertical gravity only — no horizontal slide when column empties.
      Refill: when total bubble count < 60% of starting count, new bubbles float
      in from top, staggered wave (200ms stagger between columns, 300ms float-in per bubble).
      Refill bubbles: treat types only unless level script specifies special injection.
      Cascade escalation per animated-dynamics CoS: 1st cascade normal, 2nd faster+bigger overshoot,
      3rd+ fast+exaggerated+particles. Fall uses acceleration (not constant speed).
      Landing: squash/bounce magnitude scales with fall distance.
      Stable identity per animated-dynamics: pieces retain ID through falls.

