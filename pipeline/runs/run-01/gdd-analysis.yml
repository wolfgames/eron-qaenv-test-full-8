    notes: |
      Mega Snack: formed when group ≥5, clears all in 1-cell radius.
      Mystery Bag: formed when group ≥8, clears entire row + mystery bonus score multiplier.
      Ghost Bubble: blocker, removed when all 4 orthogonal neighbors popped.
      Edge case: Ghost Bubble at board edge needs only existing (non-edge) neighbors popped.
      Special creation from tap group size is a pattern-buster mechanic;
      cos_required deferred for pattern-busters CoS (secondary pass).

  - id: tap-interaction
    name: "Core Tap Interaction (cluster pop)"
    status: new
    lifecycle_phase: PLAY
