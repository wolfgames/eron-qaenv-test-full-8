conflicts: []

risk_areas:
  - feature: game-controller
    reason: "Central integration point; touches renderer (Pixi app), ECS DB, all renderers, input routing, and destroy lifecycle. Every other PLAY feature depends on it."
  - feature: play-canvas
    reason: "Board renderer + BlockRenderer + BoardPlugin + layout bounds all must agree; grid dimensions affect HUD, companion strip, and viewport budget simultaneously."
  - feature: tap-interaction
    reason: "Queuing logic, board-state gating, invalid-tap feedback, and event dispatch must all coordinate through GameController; failure here breaks core loop."

open_questions:
  - id: q-game-name
    question: "What is the game slug? GDD title is 'Scooby Snack Smash' implying 'scooby-snack-smash'."
    context: "Slug determines <game-root> substitution in plan. Analyze must not assume — plan resolves this."

  - id: q-scoring-formula
    question: "What is the exact scoring formula? GDD specifies star rating (taps remaining) but not the score formula."
    context: "Scoring CoS requires multiplicative dimensions. Need: base per pop, group-size bonus curve, chain multiplier, Mystery Bag multiplier value, star thresholds (taps remaining cutoffs for 1/2/3 stars)."

  - id: q-continue-with-snacks
    question: "Is 'Continue with Snacks' (ad/currency for +5 taps) in core pass scope?"
    context: "GDD defines it as a button on the loss screen. Requires a currency system or ad integration — potentially out of scope for core pass. Plan must decide: stub with open question or implement."

  - id: q-chapter-level-count
    question: "How many levels per chapter? GDD doesn't specify chapter size."
    context: "chapter-complete-screen triggers when last level of chapter is cleared. Without chapter size, chapter-complete and chapter-interstitial cannot be fully wired. Plan must decide default (e.g. 10 levels/chapter) or flag as missing GDD content."

