      feedback: "Each type visually distinctive (color + shape + icon) — never color alone"
      onboarding: "Adjacency-matching rule revealed on first successful 2+ cluster pop"
    notes: |
      5 types: Scooby Snack, Sandwich, Bone, Pizza Slice, Cupcake.
      Adjacency: orthogonal only (up/down/left/right), no diagonal.
      Each type must be visually distinct per UX colorblind rule (color + shape + icon).
      Asset bundle `scene-treats` required in asset-manifest.ts.
      GDD visual descriptions are specific (sandy-beige S-stamp, cartoon sandwich, etc.) —
