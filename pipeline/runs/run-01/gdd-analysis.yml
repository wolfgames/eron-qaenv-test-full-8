      - <game-root>/logic/group-finder.ts
      - <game-root>/renderers/BoardRenderer.ts
    dependencies: [play-canvas, treat-bubbles, gravity-cascade]
    ux:
      discovery: "Any bubble on screen is tappable — no tutorial needed for first tap"
      feedback: |
        Valid tap: burst animation + audio cue for group; cascade follows.
        Invalid tap (isolated bubble): no tap consumed, companion shows 'Ruh-roh!' reaction (600ms).
        Input queued during animation (max 1 queued tap).
      onboarding: "First encounter teaches the rule: isolated = no-pop, cluster = pop"
    notes: |
      Interaction type: single tap (pointertap). One gesture, one outcome.
      Invalid tap: DOES NOT consume a tap, triggers companion Ruh-roh.
      Input is queued (not ignored) during animation — max 1 queued tap.
      Must use pointer events, touch-action:none on board container.
      Must block input during non-IDLE board states.
      Interaction archetype doc required by core-interaction CoS.
      HIGH risk: touches GameController (central integration point).

  - id: gravity-cascade
    name: "Gravity Cascade & Bubble Refill"
    status: new
    lifecycle_phase: PLAY
    risk: MEDIUM
    complexity: high
    cos_required: [animated-dynamics]
    ux_zones:
      thumb_zone: center
      touch_targets: []
